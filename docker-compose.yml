services:
  upmovies-backend:
    build:
      context: .
      target: dev
    container_name: upmovies_backend
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
      - ./tests:/app/tests
      - ./htmlcov:/app/htmlcov
    environment:
      DATABASE_URL: "postgresql+asyncpg://root:root@tbc_postgresql_db:5432/upmovies"
      TEST_DATABASE_URL: "postgresql+asyncpg://root:root@tbc_postgresql_db:5432/upmovies_test"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-dev-secret-change-me}"
      TMDB_API_KEY: "${TMDB_API_KEY:-dev-tmdb-key}"
      LOG_LEVEL: "INFO"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://app.upmovies.localhost}"
      COOKIE_DOMAIN: "${COOKIE_DOMAIN:-.upmovies.localhost}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-lax}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.upmovies-backend.rule=Host(`api.upmovies.localhost`)"
      - "traefik.http.routers.upmovies-backend.tls=true"
      - "traefik.http.routers.upmovies-backend.entrypoints=websecure"
      - "traefik.http.services.upmovies-backend.loadbalancer.server.port=8000"
    command: ["uvicorn", "upmovies.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status == 200 else 1)
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - proxy

networks:
  proxy:
    external: true
