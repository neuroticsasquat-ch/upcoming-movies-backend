version: '3'

includes:
  infra:
    taskfile: ../../tbc-localdev-infra/Taskfile.yml
    dir: ../../tbc-localdev-infra

vars:
  COMPOSE: docker compose
  SVC: upmovies-backend
  EXEC: "{{.COMPOSE}} exec {{.SVC}}"

tasks:
  up:
    desc: Start the backend container (requires infra to be up)
    cmds:
      - "{{.COMPOSE}} up -d"
  down:
    desc: Stop the backend container
    cmds:
      - "{{.COMPOSE}} down"
  build:
    desc: Rebuild the backend image
    cmds:
      - "{{.COMPOSE}} build"
  logs:
    desc: Follow backend logs
    cmds:
      - "{{.COMPOSE}} logs -f {{.SVC}}"
  shell:
    desc: Open a bash shell inside the backend container
    cmds:
      - "{{.EXEC}} bash"
  ps:
    desc: Show compose service status
    cmds:
      - "{{.COMPOSE}} ps"
  db:init:
    desc: Create the upmovies and upmovies_test databases in the shared Postgres (idempotent)
    cmds:
      - |
        for db in upmovies upmovies_test; do
          docker exec tbc_postgresql_db psql -U root -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$db'" | grep -q 1 \
            || docker exec tbc_postgresql_db psql -U root -d postgres -c "CREATE DATABASE $db"
        done
  migrate:
    desc: Run alembic migrations against the upmovies database
    cmds:
      - "{{.EXEC}} alembic upgrade head"
  makemigration:
    desc: 'Create a new autogenerated migration (task makemigration -- "message")'
    cmds:
      - "{{.EXEC}} alembic revision --autogenerate -m \"{{.CLI_ARGS}}\""
  test:
    desc: Run the pytest suite inside the container
    cmds:
      - "{{.EXEC}} pytest {{.CLI_ARGS}}"
  test:unit:
    desc: Run only the unit tests
    cmds:
      - "{{.EXEC}} pytest tests/unit {{.CLI_ARGS}}"
  test:integration:
    desc: Run only the integration tests
    cmds:
      - "{{.EXEC}} pytest tests/integration {{.CLI_ARGS}}"
  lint:
    desc: Run ruff check
    cmds:
      - "{{.EXEC}} ruff check src tests"
  format:
    desc: Run ruff format
    cmds:
      - "{{.EXEC}} ruff format src tests"
  typecheck:
    desc: Run pyright static type check
    cmds:
      - "{{.EXEC}} pyright src tests"
  coverage:
    desc: 'Run pytest with coverage (HTML report in ./htmlcov)'
    cmds:
      - "{{.EXEC}} pytest --cov=src/upmovies --cov-report=term-missing --cov-report=html {{.CLI_ARGS}}"
