name: Hourly feeds

# Triggers the light feed ingest (Phase A only — trade category feeds + broad Google
# queries, per_film=false) against the prod API every hour and waits for the run to
# reach a terminal state. Beats the ~10–20-item trade-feed rotation cap that a 24h pull
# structurally drops; dedup-on-url makes overlapping hourly re-pulls idempotent.
#
# The per-film feed pass and the LLM link pass run once a day in daily-pipeline.yml.
# Both workflows share the `upmovies-ingest` concurrency group so the 09:00 overlap
# queues instead of running two feed ingests at once.
#
# Required configuration (repo Settings → Secrets and variables → Actions):
#   secret    UPMOVIES_ADMIN_TOKEN     — must match the API's ADMIN_TOKEN
#   variable  UPMOVIES_API_BASE_URL    — prod API base URL, e.g. https://api.upmovies.example.com
#                                        (no trailing slash)
#   secret    SENTRY_CRON_DSN          — optional; the backlotter-backend Sentry DSN. When set,
#                                        the job reports a cron monitor check-in (slug
#                                        `hourly-feeds`). Unset → check-ins are skipped.

on:
  schedule:
    - cron: '0 * * * *' # top of every hour
  workflow_dispatch:

concurrency:
  group: upmovies-ingest
  cancel-in-progress: false

jobs:
  feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ADMIN_TOKEN: ${{ secrets.UPMOVIES_ADMIN_TOKEN }}
      API_BASE_URL: ${{ vars.UPMOVIES_API_BASE_URL }}
      # Optional Sentry cron monitor. = the backlotter-backend project DSN. Unset → check-ins skip.
      SENTRY_DSN: ${{ secrets.SENTRY_CRON_DSN }}
    steps:
      - name: Sentry monitor check-in (start)
        env:
          MONITOR_SLUG: hourly-feeds
          MONITOR_SCHEDULE: "0 * * * *"
          CHECKIN_MARGIN: "10"
          MAX_RUNTIME: "20"
        run: |
          set -uo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "SENTRY_CRON_DSN not set; skipping Sentry cron check-in"
            echo "SENTRY_CHECKIN_SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi
          # Derive the cron check-in URL from the DSN (https://<key>@<host>/<project_id>).
          key=$(printf '%s' "$SENTRY_DSN" | sed -E 's#https?://([^@]+)@.*#\1#')
          host=$(printf '%s' "$SENTRY_DSN" | sed -E 's#https?://[^@]+@([^/]+)/.*#\1#')
          project=$(printf '%s' "$SENTRY_DSN" | sed -E 's#.*/##')
          checkin_url="https://${host}/api/${project}/cron/${MONITOR_SLUG}/${key}/"
          check_in_id=$(tr -d '-' < /proc/sys/kernel/random/uuid)
          # Upsert the monitor (schedule) and open the run. Never fail the job on a check-in error.
          curl -sS -m 10 -X POST "$checkin_url" \
            -H 'Content-Type: application/json' \
            -d "{\"status\":\"in_progress\",\"check_in_id\":\"${check_in_id}\",\"environment\":\"production\",\"monitor_config\":{\"schedule\":{\"type\":\"crontab\",\"value\":\"${MONITOR_SCHEDULE}\"},\"checkin_margin\":${CHECKIN_MARGIN},\"max_runtime\":${MAX_RUNTIME},\"timezone\":\"UTC\"}}" \
            >/dev/null || echo "::warning::Sentry in_progress check-in failed (non-fatal)"
          echo "SENTRY_CHECKIN_URL=${checkin_url}" >> "$GITHUB_ENV"
          echo "SENTRY_CHECK_IN_ID=${check_in_id}" >> "$GITHUB_ENV"

      - name: Trigger and await feed ingest
        run: |
          set -uo pipefail
          : "${ADMIN_TOKEN:?UPMOVIES_ADMIN_TOKEN secret is required}"
          : "${API_BASE_URL:?UPMOVIES_API_BASE_URL variable is required}"

          # trigger_and_wait <pipeline> [query]: POST /admin/ingest/<pipeline><query>,
          # then poll GET /admin/ingest/<run_id> every 30s until terminal. Returns
          # non-zero on failed/cancelled, a missing run_id, or timeout (~15 min — the
          # hourly Phase-A pull is light, ~11 requests).
          trigger_and_wait() {
            local pipeline="$1"
            local query="${2:-}"
            local response run_id body status i

            echo "::group::Trigger ${pipeline}${query}"
            response=$(curl -fsS -X POST \
              -H "Authorization: Bearer ${ADMIN_TOKEN}" \
              "${API_BASE_URL}/admin/ingest/${pipeline}${query}") || {
                echo "::endgroup::"
                echo "failed to trigger ${pipeline} ingestion"
                return 1
              }
            run_id=$(echo "${response}" | jq -r '.run_id')
            echo "run_id=${run_id}"
            echo "::endgroup::"

            if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
              echo "no run_id returned for ${pipeline}"
              return 1
            fi

            echo "::group::Await ${pipeline} run ${run_id}"
            for i in $(seq 1 30); do
              body=$(curl -fsS \
                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                "${API_BASE_URL}/admin/ingest/${run_id}") || {
                  echo "[${i}] ${pipeline} poll request failed; retrying"
                  sleep 30
                  continue
                }
              status=$(echo "${body}" | jq -r '.status')
              echo "[${i}] ${pipeline} status=${status}"
              case "${status}" in
                succeeded)
                  echo "${body}" | jq .
                  echo "::endgroup::"
                  return 0
                  ;;
                failed | cancelled)
                  echo "${body}" | jq .
                  echo "::endgroup::"
                  echo "${pipeline} run ${run_id} ended: ${status}"
                  return 1
                  ;;
              esac
              sleep 30
            done
            echo "::endgroup::"
            echo "timed out waiting for ${pipeline} run ${run_id}"
            return 1
          }

          trigger_and_wait feeds "?per_film=false"

      - name: Sentry monitor check-in (finish)
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -uo pipefail
          if [ "${SENTRY_CHECKIN_SKIP:-}" = "1" ] || [ -z "${SENTRY_CHECK_IN_ID:-}" ] || [ -z "${SENTRY_CHECKIN_URL:-}" ]; then
            echo "No Sentry cron check-in to finalize"
            exit 0
          fi
          if [ "$JOB_STATUS" = "success" ]; then sentry_status=ok; else sentry_status=error; fi
          curl -sS -m 10 -X POST "$SENTRY_CHECKIN_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"status\":\"${sentry_status}\",\"check_in_id\":\"${SENTRY_CHECK_IN_ID}\",\"environment\":\"production\"}" \
            >/dev/null || echo "::warning::Sentry final check-in failed (non-fatal)"
          echo "Sentry cron check-in finalized: ${sentry_status}"
