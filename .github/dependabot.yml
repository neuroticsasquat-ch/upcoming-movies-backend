version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "09:00"
      timezone: America/New_York
    target-branch: updates/dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "09:00"
      timezone: America/New_York
    target-branch: updates/dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
